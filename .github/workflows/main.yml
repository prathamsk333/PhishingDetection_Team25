name: CI – Build & Push Docker Image (R)

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v1

            - name: Build, tag, and push Docker image to ECR
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: networksecurity-r
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
                  docker push  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  docker tag   $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                               $ECR_REGISTRY/$ECR_REPOSITORY:latest
                  docker push  $ECR_REGISTRY/$ECR_REPOSITORY:latest

            - name: Deploy to EC2 (SSH)
              uses: appleboy/ssh-action@v0.1.10
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      docker pull ${{ steps.login-ecr.outputs.registry }}/networksecurity-r:latest
                      docker stop networksecurity-r || true
                      docker rm   networksecurity-r || true
                      docker run -d --name networksecurity-r -p 8000:8000 \
                        -e MONGODB_URL_KEY="${{ secrets.MONGODB_URL_KEY }}" \
                        -e MONGO_DB_URL="${{ secrets.MONGO_DB_URL }}" \
                        ${{ steps.login-ecr.outputs.registry }}/networksecurity-r:latest
